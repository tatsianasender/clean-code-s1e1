<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link 
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
      rel="stylesheet"
    >
    <link 
      rel="stylesheet" 
      href="style.css" 
      media="screen" 
      charset="utf-8"
    >
  </head>
  <body class="wrapper">
    <section class="info">
      <img 
        class="info__img" 
        src="./eisenhower-matrix.jpg"
        alt="tasks matrix"
      >
      <a 
        class="info__link" 
        href="https://goal-life.com/page/method/matrix-eisenhower"
      >
        Want more details?
      </a>
    </section>
    <main class="tasks">
      <div id="add-task-section">
        <label
          class="task__label"
          for="new-task"
        >
          Add Item
        </label>
        <div class="task__row-wrapper">
          <input 
            id="new-task"
            class="task__input"
            type="text"
          >
          <button class="btn">Add</button>
        </div>
      </div>
      <h3 class="heading">Todo</h3>
      <ul 
        id="incomplete-tasks"
        class="tasks-list"
      >    
        <li class="task">
          <input type="checkbox">
          <label class="task__label">Pay Bills</label>
          <input 
            type="text" 
            class="task__input"
          >
          <button class="btn edit">Edit</button>
          <button class="btn delete">
            <img 
              src="./remove.svg"
              class="btn__img"
              alt="delete icon"
            >
          </button>
        </li>
        <li class="task edit-mode">
          <input type="checkbox">
          <label class="task__label">Go Shopping</label>
          <input 
            type="text" 
            value="Go Shopping" 
            class="task__input"
          >
          <button class="btn edit">Save</button>
          <button class="btn delete">
            <img 
              class="btn__img" 
              src="./remove.svg"
              alt="delete icon"
            >
          </button>
        </li>
      </ul>
      <h3 class="heading">Completed</h3>
      <ul 
        id="completed-tasks"
        class="tasks-list" 
      >
        <li class="task">
          <input 
            type="checkbox" 
            checked
          >
          <label class="task__label">See the Doctor</label>
          <input 
            type="text" 
            class="task__input"
          >
          <button class="btn edit">Edit</button>
          <button class="btn delete">
            <img 
              class="btn__img"
              src="./remove.svg"
              alt="delete icon"
            >
          </button>
        </li>
      </ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>
